<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- 배경 라운드 사각형 -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- 빛나는 효과 -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>
  
  <!-- 하단 장식 라인 -->
  <rect x="60" y="400" width="392" height="4" rx="2" fill="#ffffff" opacity="0.2"/>
  <rect x="100" y="416" width="312" height="3" rx="1.5" fill="#ffffff" opacity="0.12"/>
  
  <!-- 상단 장식 도트 -->
  <circle cx="80" cy="80" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="432" cy="80" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="80" cy="432" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="432" cy="432" r="6" fill="#ffffff" opacity="0.15"/>
  
  <!-- 메인 텍스트: DSi -->
  <text x="256" y="260" font-family="'Segoe UI', 'Arial Black', Arial, sans-serif" font-size="168" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central" filter="url(#textShadow)" letter-spacing="-6">DSi</text>
  
  <!-- 하단 텍스트: net -->
  <text x="256" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="300" fill="#bfdbfe" text-anchor="middle" dominant-baseline="central" letter-spacing="12">net</text>
  
  <!-- 미세한 테두리 -->
  <rect x="4" y="4" width="504" height="504" rx="94" ry="94" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
</svg>
